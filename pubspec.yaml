name: socialbox
description: "SocialBox - Organize, schedule, and track your social media content."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Functional & DI
  fpdart: ^1.1.0
  get_it: ^7.7.0
  injectable: ^2.4.4

  # Database
  drift: ^2.18.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0

  # Navigation
  go_router: ^14.2.7

  # UI Utilities
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Network
  dio: ^5.6.0
  http: ^1.2.2

  # Background
  workmanager: ^0.9.0+3

  # OAuth
  flutter_appauth: ^7.0.0
  app_links: ^6.3.2

  # Calendar
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  injectable_generator: ^2.6.2
  drift_dev: ^2.18.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
